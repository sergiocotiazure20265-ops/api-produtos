name: Pipeline Node.js - AWS Elastic Beanstalk

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  AWS_REGION: us-east-2
  EB_APPLICATION_NAME: ApiProdutos
  EB_ENVIRONMENT_NAME: ApiProdutos-env

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código do projeto
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Executar build
        run: |
          echo "Executando o BUILD da aplicação api-produtos..."
          npm run build --if-present

      - name: Validar arquivo index.js
        run: |
          if [ ! -f "index.js" ]; then
            echo "ERRO: o arquivo index.js não foi encontrado."
            exit 1
          fi

          echo "Arquivo index.js encontrado com sucesso."

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Executar testes
        run: |
          echo "Executando os TESTES da aplicação api-produtos..."
          echo "Por enquanto, os testes estão simulados."
          echo "Testes executados com sucesso."

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Baixar o código do projeto
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Elastic Beanstalk CLI
        run: |
          python -m pip install --upgrade pip
          pip install awsebcli

      - name: Verificar instalação da EB CLI
        run: eb --version

      - name: Configurar credenciais da AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Inicializar configuração do Elastic Beanstalk
        run: |
          eb init "$EB_APPLICATION_NAME" \
            --region "$AWS_REGION" \
            --platform node.js

      - name: Realizar deploy no Elastic Beanstalk
        run: |
          echo "Iniciando deploy da aplicação $EB_APPLICATION_NAME..."
          echo "Ambiente: $EB_ENVIRONMENT_NAME"
          echo "Região: $AWS_REGION"

          eb deploy "$EB_ENVIRONMENT_NAME" \
            --label "v-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}" \
            --timeout 20

      - name: Consultar status do ambiente
        run: |
          eb status "$EB_ENVIRONMENT_NAME"